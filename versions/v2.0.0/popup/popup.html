<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLUETUBE Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <span class="logo-icon">🎯</span>
        <span class="logo-text">CLUETUBE</span>
      </div>
      <span class="version">v1.7.0</span>
    </header>

    <!-- Status indicator -->
    <div id="status" class="status status-unconfigured">
      <span class="status-dot"></span>
      <span class="status-text">Not configured</span>
    </div>

    <!-- Settings form -->
    <form id="settings-form" class="settings-form">
      <!-- Provider selection -->
      <div class="form-group">
        <label for="provider">LLM Provider</label>
        <select id="provider" name="provider">
          <option value="google">Google (Gemini)</option>
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI (GPT)</option>
        </select>
      </div>

      <!-- Model selection -->
      <div class="form-group">
        <label for="model">Model</label>
        <select id="model" name="model">
          <!-- Options populated by JavaScript -->
        </select>
      </div>

      <!-- API Key input -->
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="apiKey" 
            name="apiKey" 
            placeholder="Enter your API key"
            autocomplete="off"
          >
          <button type="button" id="toggle-visibility" class="icon-btn" title="Toggle visibility">
            <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
        </div>
        <p class="help-text">
          Your API key is stored locally and never sent to any server except the LLM provider.
        </p>
      </div>

      <!-- Save button -->
      <button type="submit" id="save-btn" class="btn btn-primary">
        Save Settings
      </button>
    </form>

    <!-- Divider -->
    <hr class="divider">

    <!-- Cache management -->
    <div class="cache-section">
      <div class="cache-info">
        <span class="cache-label">Cached results:</span>
        <span id="cache-count" class="cache-count">0</span>
      </div>
      <button type="button" id="clear-cache-btn" class="btn btn-secondary">
        Clear Cache
      </button>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <p>Hover over any YouTube thumbnail and click "Check" to analyze.</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
