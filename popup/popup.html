<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClueTube Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <img src="../assets/icons/icon48-transparent.png" alt="ClueTube Logo" class="logo-icon" width="24" height="24">
        <span class="logo-text">ClueTube</span>
      </div>
      <span class="version">v1.7.1 (Qwen)</span>
    </header>

    <!-- Status indicator -->
    <div id="status" class="status status-unconfigured">
      <span class="status-dot"></span>
      <span class="status-text">Not configured</span>
    </div>
    <!-- Analyse section (video page detection) -->
    <div id="analyse-section" class="analyse-section">
      <div id="analyse-video-info" class="analyse-video-info" style="display:none">
        <div class="analyse-top-row">
          <p class="analyse-video-title" id="analyse-video-title"></p>
          <button type="button" id="analyse-btn" class="btn btn-analyse">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z" />
            </svg>
            Analyse
          </button>
        </div>
        <div class="popup-gemini-buttons" id="popup-gemini-buttons">
          <button class="popup-gemini-btn" data-mode="elaborate">Elaborate Title ↗</button>
          <button class="popup-gemini-btn" data-mode="keypoints">Key Points ↗</button>
          <button class="popup-gemini-btn" data-mode="summarise">Summarise ↗</button>
        </div>
      </div>
      <div id="analyse-not-video" class="analyse-not-video">
        <p>Navigate to a YouTube video to analyse</p>
      </div>
      <div id="analyse-results" class="analyse-results" style="display:none"></div>
    </div>

    <hr class="divider">

    <!-- Settings form -->
    <form id="settings-form" class="settings-form">
      <!-- Provider selection -->
      <div class="form-group">
        <label for="provider">LLM Provider</label>
        <select id="provider" name="provider">
          <option value="google">Google (Gemini)</option>
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI (GPT)</option>
          <option value="alibaba">Alibaba (Qwen)</option>
          <option value="openrouter">OpenRouter</option>
        </select>
      </div>

      <!-- Model selection -->
      <div class="form-group">
        <label for="model">Model</label>
        <select id="model" name="model">
          <!-- Options populated by JavaScript -->
        </select>
      </div>

      <!-- API Key input -->
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <div class="input-wrapper">
          <input type="password" id="apiKey" name="apiKey" placeholder="Enter your API key" autocomplete="off">
          <button type="button" id="toggle-visibility" class="icon-btn" title="Toggle visibility">
            <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path
                d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
            </svg>
          </button>
        </div>
        <p class="help-text">
          Your API key is stored locally and never sent to any server except the LLM provider.
        </p>
      </div>

      <!-- Save button -->
      <button type="submit" id="save-btn" class="btn btn-primary">
        Save Settings
      </button>
    </form>

    <!-- Divider -->
    <hr class="divider">

    <!-- Cache management -->
    <div class="cache-section">
      <div class="cache-info">
        <span class="cache-label">Cached results:</span>
        <span id="cache-count" class="cache-count">0</span>
      </div>
      <button type="button" id="clear-cache-btn" class="btn btn-secondary">
        Clear Cache
      </button>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <p>Click "Analyse" above on any YouTube video, or hover thumbnails to check.</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
